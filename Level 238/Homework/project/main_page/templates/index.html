<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script
        src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp,container-queries"></script>
    <title>Document</title>
</head>

<body class="min-h-screen bg-gray-950 text-white">
    <header class="px-10 py-5">
        <h1 class="text-[30px] font-bold">Moto<span class="text-red-600">Rush</span> </h1>
    </header>
    <main class="w-full px-10 flex justify-between items-center gap-[50px] min-h-[65vh]">
        <section class="w-full flex flex-col items-start gap-[20px]">
            <div class="flex items-center gap-[10px] ">
                <img src="https://i.pinimg.com/1200x/7d/71/98/7d7198b1697b35f476e899601441d7cc.jpg"
                    class="w-[55px] rounded " alt="">
                <p>
                    <i class="font-bold tracking-[1px]">JAPAN</i>
                </p>
            </div>
            <ul class="flex flex-wrap w-full gap-[40px]">
                <a href="{% url 'yamaha' %}">
                    <li class="flex flex-col-reverse items-center gap-[3px]">
                        <p class="tracking-[1px]">Yamaha</p>
                        <div class="w-[130px] h-[130px] overflow-hidden rounded-[50%]">
                            <img src="https://i.pinimg.com/736x/a5/c1/b8/a5c1b8e70d2d9b8e16cd074aee0df649.jpg" alt=""
                                class="w-[130px] h-[130px]  object-cover scale-[1.9]">
                        </div>
                    </li>
                </a>
                <a href="/kawasaki">
                    <li class="flex flex-col-reverse items-center gap-[3px] ">
                        <p class="tracking-[1px]">Kawasaki</p>
                        <div class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative">
                            <img src="https://i.pinimg.com/736x/5d/ce/82/5dce824f89fa4b44ab422487afb10668.jpg" alt=""
                                class="w-[130px] h-[130px]  object-cover scale-[1.4] absolute top-[15px] left-[2px]">
                        </div>
                    </li>
                </a>
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">Honda</p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center">
                        <img src="https://i.pinimg.com/736x/ca/1c/9c/ca1c9c4e689dab0ca650175b6ff6899f.jpg" alt="">
                    </div>
                </li>
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">Suzuki</p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center">
                        <img src="https://i.pinimg.com/736x/28/f1/f9/28f1f922841373af8b65b0676c4c38d6.jpg" alt=""
                            class="absolute -top-[55px]">
                    </div>
                </li>
            </ul>
        </section>
        <section class="w-full flex flex-col items-start gap-[20px]">
            <div class="flex items-center gap-[10px] ">
                <img src="https://i.pinimg.com/736x/0a/7f/7e/0a7f7e875f661f42244ce3f370c616c8.jpg"
                    class="w-[55px] rounded " alt="">
                <p>
                    <i class="font-bold tracking-[1px]">EUROPEAN</i>
                </p>
            </div>
            <ul class="flex flex-wrap w-full gap-[40px]">
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">Ducati</p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center bg-black">
                        <img src="https://i.pinimg.com/736x/3f/dd/c3/3fddc3b9de6633eac12b73ffd33ed996.jpg" alt=""
                            class="object-cover ">
                    </div>
                </li>
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">BMW</p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center bg-black">
                        <img src="https://i.pinimg.com/1200x/0f/44/70/0f4470b1a15412664ce679d9b5857977.jpg" alt=""
                            class="object-cover scale-[1.9]">
                    </div>
                </li>
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">
                        Aprilia
                    </p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center bg-black">
                        <img src="https://i.pinimg.com/1200x/92/ae/ee/92aeeedbd0d2459b5dfec470b8f850f4.jpg" alt=""
                            class="object-cover scale-[0.9]">
                    </div>
                </li>
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">KTM</p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center bg-black">
                        <img src="https://i.pinimg.com/736x/c0/6b/7b/c06b7bb7259f1f353185c0c1114caa9e.jpg" alt="">
                    </div>
                </li>
            </ul>
        </section>
    </main>
    <footer class="h-[23vh] bg-black px-10 py-5">
        <ul>
            <li><a href="">Facebook</a></li>
            <li><a href="">Instagram</a></li>
            <li><a href="">Telegram</a></li>
            <li><a href=""></a></li>
        </ul>
    </footer>
</body>

</html>
