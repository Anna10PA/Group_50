{% extends 'index.html' %}

{% block title %}
<title>PostMart</title>
{% endblock %}

{% block nav %}
<nav class="flex items-center gap-7 justify-between max-md:hidden w-[74%] text-[#0101BD]  text-2xl">
    <div class="w-[70%] flex items-center justify-around">
        <a href="">
            <i class="fa-solid fa-house duration-100 hover:text-[#0101BD]"></i>
        </a>
        <a href="">
            <i class="fa-solid fa-user-group text-gray-700 duration-100 hover:text-[#0101BD]"></i>
        </a>
        <a href="">
            <i class="fa-solid fa-bell text-2xl text-gray-700 duration-100 hover:text-[#0101BD]"></i>
        </a>
        <a href="" class="hidden">
            <i class="fa-solid fa-comment text-gray-700 duration-100 hover:text-[#0101BD] "></i>
        </a>
        <a href="/home/add_post">
            <i class="fa-solid fa-plus text-[27px] text-gray-700 "></i>
        </a>
    </div>
    <div class="flex items-center gap-4">
        <a href="/logout">
            <i class="fa-solid fa-arrow-right-from-bracket text-2xl duration-100 hover:text-[#0101BD]"></i>
        </a>
        <a href="/home/{{ user.email }}">
            <img src="https://i.pinimg.com/736x/27/5f/99/275f99923b080b18e7b474ed6155a17f.jpg" alt="profile"
                class="w-11 h-11 rounded-[50%] object-cover cursor-pointer">
        </a>
    </div>
</nav>
{% endblock %}

{% block mainContent %}
<main class="flex w-full items-center justify-between max-md:flex-col max-sm:justify-center">
    <section
        class="w-full flex flex-col items-center justify-center gap-10 p-10 max-md:w-full max-sm:gap-5 max-sm:p-5 h-[88vh] overflow-auto max-md:h-[50vh]">
        {% for p in posts %}
        <div class="border border-gray-300 rounded px-7 py-5 flex flex-col items-start gap-3 w-full max-w-[480px]">
            <div class="flex items-center gap-5 w-full">
                <img src="https://i.pinimg.com/736x/27/5f/99/275f99923b080b18e7b474ed6155a17f.jpg" alt="" class="w-15 h-15 rounded-[50%] object-cover">
                <div>
                    <p class="font-bold text-[#0101BD] text-xl">{{p.user.name}} {{p.user.surname}}</p>
                    <p class="text-sm text-gray-500">{{p.user.email}}</p>
                </div>
            </div>
            <div>
                <p>{{p.post.desc}} </p>
            </div>
            <div class="flex flex-wrap">
                <img src="{% p.post.post %}" class="w-full" alt="">
            </div>
            <div class="flex items-center justify-between w-full text-gray-500">
                <div class="w-[40%] flex items-center justify-between text-2xl mt-2 ">
                    <i class="fa-solid fa-heart cursor-pointer duration-100 hover:text-red-500"></i>
                    <i class="fa-solid fa-comment cursor-pointer duration-100 hover:text-[#0101BD]"></i>
                    <i class="fa-solid fa-bookmark cursor-pointer duration-100 hover:text-orange-500"></i>
                </div>
                <p>{{ p.post.created_at }}</p>
            </div>
        </div>
        {% endfor %}
    </section>


</main>
{% endblock %}
