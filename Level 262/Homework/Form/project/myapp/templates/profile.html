{% extends 'index.html' %}

{% block nav %}
<nav>
    <a href="/home" class="text-[#0101BD]">
        <i class="fa-solid fa-backward text-2xl"></i>
    </a>
</nav>
{% endblock %}

{% block mainContent %}
<main class="flex w-full items-center justify-between max-md:flex-col max-sm:justify-center">
    <section
        class="w-full flex flex-col items-center justify-center gap-10 p-10 max-md:w-full max-sm:gap-5 max-sm:p-5 h-[88vh] max-md:h-[50vh]">
        <div class="flex flex-col items-center gap-5">
            <div class="flex items-start gap-10">
                <img src="https://i.pinimg.com/736x/27/5f/99/275f99923b080b18e7b474ed6155a17f.jpg" alt="profile"
                    class="w-45 h-45 rounded-[50%] object-cover">
                <div class="flex flex-col items-start gap-5 text-gray-800">
                    <div class="text-4xl font-bold text-[#0101BD]">
                        <p>{{ user.name }}</p>
                        <p>{{ user.surname }}</p>
                    </div>
                    <div>
                        <p>{{ user.email }}</p>
                        <div class="">
                            <p class="text-sm">50K post</p>
                            <p class="text-sm">450 friend</p>
                        </div>
                    </div>
                </div>
            </div>
            <button
                class="bg-[#0101BD] text-white px-5 py-2 w-full rounded duration-100 cursor-pointer hover:bg-[#0101AA]">Edit
                profile</button>
            <div class="w-full">
                <div class="flex items-center justify-between text-gray-700 font-semibold w-full">
                    <div>
                        <i class="fa-solid fa-cake-candles"></i>
                        birthday
                    </div>
                    <p>
                        {{user.b_date}}
                    </p>
                </div>
                <div class="flex items-center justify-between text-gray-700 font-semibold w-full">
                    <div>
                        <i class="fa-solid fa-calendar-check"></i>
                        Registration day
                    </div>
                    <p>
                        {{user.reg_date}}
                    </p>
                </div>
            </div>
        </div>
    </section>
    <section>

    </section>
</main>
{% endblock %}
