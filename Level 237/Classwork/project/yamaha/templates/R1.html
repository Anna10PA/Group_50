<head>

    <title>Document</title>

<body class="min-h-screen bg-gray-950 text-white">
    <header class="px-10 py-5">
        <h1 class="text-[30px] font-bold">Moto<span class="text-red-600">Rush</span> </h1>
    </header>
    <main class="w-full px-10 flex flex-col justify-center items-start gap-[50px] min-h-[65vh]">

        <section class="h-[50vh] flex items-center gap-10 justify-between w-full flex-wrap">
            <div class="flex items-center gap-3">
                <div class="flex flex-col items-center gap-3">
                    <img src="https://cdpcdn.dx1app.com/products/USA/YA/2025/MC/SUPERSPORT/YZF-R1/50/TEAM_YAMAHA_BLUE/2000000089.jpg" alt="" class="w-[100px] h-[100px] object-cover rounded">

                </div>

            </div>
            <div class="w-[50%]">
                <h1 class="font-bold text-[35px] mb-[20px]">Yamaha YZF-R1</h1>
                <p class="text-gray-400 tracking-[0.5px]">Category: Sport bike</p>
                <p class="text-gray-400 tracking-[0.5px]">Top speed: 295-300 km/h</p>
                <p class="text-gray-400 tracking-[0.5px]">Engine capacity: 998cc</p>
                <p class="text-gray-400 tracking-[0.5px]">Production years: 1998 - 2026 (present)</p>
                <p class="text-gray-400 tracking-[0.5px]">Transmission: 6 speed manual</p>
                <p class="text-gray-400 tracking-[0.5px]">Weight: 200Kg</p>
                <p class="text-gray-400 tracking-[0.5px]">Country: JAPAN</p>
                <p class="text-gray-400 tracking-[0.5px]">Manufacturer: Yamaha Motor Company</p>
                <h3 class="text-[35px] font-bold tracking-[1px] text-green-500 mt-[20px]">Price: $17 000 - $20 000</h3>
            </div>
        </section>

    <footer class="h-[23vh] bg-black px-10 py-5">
