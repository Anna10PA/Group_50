<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script
        src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp,container-queries"></script>
    <title>Document</title>
</head>

<body class="min-h-screen bg-gray-950 text-white">
    <header class="px-10 py-5">
        <h1 class="text-[30px] font-bold">Moto<span class="text-red-600">Rush</span> </h1>
    </header>
    <main class="w-full px-10 flex flex-col justify-center items-start gap-[50px] min-h-[65vh]">
        <div class="flex items-center gap-[10px] ">
            <img src="https://i.pinimg.com/736x/a5/c1/b8/a5c1b8e70d2d9b8e16cd074aee0df649.jpg"
                class="w-[55px] rounded-[50%] " alt="">
            <p>
                <i class="font-bold tracking-[1px]">YAMAHA</i>
            </p>
        </div>
        <section class="w-full flex flex-col items-start justify-center gap-[20px]">
            <ul class="flex flex-wrap w-full gap-[40px] justify-center">
                <a href="{% url 'r1' %}">
                    <li class="flex flex-col-reverse items-center gap-[3px]">
                        <p class="tracking-[1px]">R1</p>
                        <div class="w-[130px] h-[130px] overflow-hidden rounded-[50%]">
                            <img src="https://superbikefactory.co.uk/media/wysiwyg/Yamaha_R1_Side_On.png" alt=""
                                class="w-[130px] h-[130px]  object-cover">
                        </div>
                    </li>
                </a>
                <a href="/kawasaki">
                    <li class="flex flex-col-reverse items-center gap-[3px] ">
                        <p class="tracking-[1px]">R6</p>
                        <div class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative">
                            <img src="https://tse3.mm.bing.net/th/id/OIP.FmRi0FVmyf1eEvONs9NsMAHaEK?pid=Api&P=0&h=220" alt=""
                                class="w-[130px] h-[130px]  object-cover">
                        </div>
                    </li>
                </a>
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">R7</p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center">
                        <img src="https://tse2.mm.bing.net/th/id/OIP.kn_s8WRQxL_V6cNpwMR_ngHaE6?pid=Api&P=0&h=220" class="scale-[1.5]">
                    </div>
                </li>
                <li class="flex flex-col-reverse items-center gap-[3px]">
                    <p class="tracking-[1px]">R15</p>
                    <div
                        class="w-[130px] h-[130px] overflow-hidden rounded-[50%] relative flex items-center justify-center">
                        <img src="https://media.zigcdn.com/media/model/2021/Sep/right-side-view-137975553_930x620.jpg" alt=""
                            class="scale-[1.8]">
                    </div>
                </li>
            </ul>
        </section>
    </main>
    <footer class="h-[23vh] bg-black px-10 py-5">
        <ul>
            <li><a href="">Facebook</a></li>
            <li><a href="">Instagram</a></li>
            <li><a href="">Telegram</a></li>
            <li><a href=""></a></li>
        </ul>
    </footer>
</body>

</html>
